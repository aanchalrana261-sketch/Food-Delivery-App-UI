<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#F8D7FF,
#EBD6FF
);
}

.card{
width:350px;
background:white;
padding:35px;
border-radius:35px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.1);
}

.avatar{
width:90px;
height:90px;
background:#F6D7FF;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:45px;
margin:auto;
}

h1{
margin:20px 0;
color:#7A3CFF;
}

input{
width:100%;
height:55px;
margin-top:15px;
padding-left:15px;
border:none;
background:#F5F5F5;
border-radius:15px;
}

.btn{
display:block;
margin-top:20px;
padding:15px;

background:linear-gradient(
90deg,
#FF5C8A,
#B85CFF
);

border-radius:50px;

color:white;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div class="avatar">💖</div>

<h1>Welcome Back</h1>

<input
type="email"
placeholder="Email Address">

<input
type="password"
placeholder="Password">

<a href="success.html"
class="btn">

❤️ Login

</a>

</div>

</body>
</html>
